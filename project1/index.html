<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>quiz game</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="main">
            <div class="starter">
        <h1>QUIZ TIME!</h1>
        <p>Test your knowledge with this fun question</p>
        <button>Start</button>
    </div>


    <div class="question-div">
        <h1 class="question-text">
            question goes here
        </h1>
        <div class="status-bar">
            <p>Question 2/5</p>
            <p>score:2</p>
        </div>
        <div class="question-option">
            <ul>
                <li>option 1</li>
                <li>option 2</li>
                <li>option 3</li>
                <li>option 4</li>
            </ul>
        </div>
            <div class="progress-bar"></div>
    </div>


    <div class="result-page">
            <h1>QUIZ Result</h1>
            <p>you scored 1 out of 5</p>

            <h1>KEEP STUDING YOU WILL BE GET BETTER !</h1>
            <button>Restart</button>
    </div>
    </div>
</body>
</html>
