<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>background videoed Landing page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: monospace;
            box-sizing: border-box;

        }
        .hero .video video{
            width:100%;
            height: 100%;

        }
        .hero .video{
            width: 100%;
            height: 100%;
            overflow: hidden;
            object-fit: cover;
            object-position: center;
        }
        .hero{
            display: flex;
            justify-content: center;
            width: 100%;
            height: 100%;
            align-items: center;
            overflow: hidden;
            flex-direction: column;
    
        }

        
        
        .explorer{
            display: flex;
            flex-direction:column;
            gap: 12px;
            position: absolute;

        }
        .explorer h1{
            font-size: 50px;
            color: white;

        }
        .explorer h1:hover{
            color: transparent;
            -webkit-text-stroke: 2px white;
        }
        .explorer button{
            border: none;
            padding: 5px;
            border-radius: 12px;
            font-size: 20px;

        }
        .explorer button:hover{
            background-color: rgb(200, 194, 194);
            transition: 4;

        }
        .navbar{
            display: flex;
            background-color: transparent;
            position: relative;
            top: 180px;

            justify-content: space-between;

            padding: 20px;
        }
        .navbar .navigator ul{
            display: flex;
            gap: 20px;

        }
        .navbar .navigator ul li{
            font-size: 20px;
            list-style: none;
            padding: 5px;

        }
        .navbar .image img{
            width: 100%;
            height: 100%;

        }
        .navbar .image{
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 50%;
            overflow: hidden;
        }
        
        
    </style>
</head>
<body>


    <div class="hero">
        <div class="video">
            <video autoplay loop muted  src="../src/video/348904_medium.mp4"></video>
        </div>
        <div class="explorer">
            <h1>JOURNEY</h1>
            <button>Explore</button>
        </div>
    </div>
</body>
</html>
